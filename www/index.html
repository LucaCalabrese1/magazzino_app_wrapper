<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>INTIME Magazzino</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: #007aff; letter-spacing: -0.03em; }
    .muted { font-size: 0.9rem; color: #8e8e93; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e5ea;
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">INTIME</div>
  <div class="spinner" aria-hidden="true"></div>
  <p class="muted">Caricamento magazzino…</p>
  <script>
    // Fallback se server.url in capacitor.config non è attivo (es. test locale senza config).
    var APP_URL = 'https://www.mondocartaordini.it/magazzino-app/dashboard';
    location.replace(APP_URL);
  </script>
</body>
</html>
